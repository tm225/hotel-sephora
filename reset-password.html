<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réinitialiser le mot de passe — Sephora Hotel</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="assets/admin.css">
</head>
<body class="admin-body">

<div class="admin-login">
  <h1>Nouveau mot de passe</h1>
  <p class="sub">Sephora Hotel — espace admin</p>

  <form id="resetForm">
    <div class="field">
      <label for="new-pass">Nouveau mot de passe</label>
      <input type="password" id="new-pass" minlength="6" required autocomplete="new-password">
    </div>
    <div class="field">
      <label for="new-pass-confirm">Confirmer le mot de passe</label>
      <input type="password" id="new-pass-confirm" minlength="6" required autocomplete="new-password">
    </div>
    <button type="submit" class="admin-btn">Enregistrer</button>
    <p id="resetMsg" class="err"></p>
  </form>

  <a href="admin.html" class="admin-link-btn">Retour à la connexion</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase.js"></script>
<script>
const resetForm = document.getElementById('resetForm');
const resetMsg = document.getElementById('resetMsg');

resetForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const pass1 = document.getElementById('new-pass').value;
  const pass2 = document.getElementById('new-pass-confirm').value;

  if (pass1 !== pass2) {
    resetMsg.style.color = 'var(--coral)';
    resetMsg.textContent = 'Les deux mots de passe ne correspondent pas.';
    return;
  }

  resetMsg.style.color = 'var(--cream)';
  resetMsg.textContent = 'Enregistrement…';

  const result = await mettreAJourMotDePasse(pass1);
  if (result.success) {
    resetMsg.style.color = 'var(--teal)';
    resetMsg.textContent = 'Mot de passe mis à jour ! Redirection…';
    setTimeout(() => { window.location.href = 'admin.html'; }, 1500);
  } else {
    resetMsg.style.color = 'var(--coral)';
    resetMsg.textContent = "Le lien a peut-être expiré. Redemandez un nouveau lien depuis la page de connexion.";
  }
});
</script>
</body>
</html>
